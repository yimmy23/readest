<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 16px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        color: #1a1a1a;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 15px;
      }
      #url {
        margin: 0 0 12px;
        font-size: 12px;
        color: #666;
        word-break: break-all;
      }
      button {
        width: 100%;
        padding: 9px 12px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: #1a1a1a;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        margin: 10px 0 0;
        font-size: 12px;
        min-height: 16px;
      }
      .err {
        color: #c0392b;
      }
      .ok {
        color: #1e8e3e;
      }
      a {
        color: #1a1a1a;
      }
    </style>
  </head>
  <body>
    <h1>Send to Readest</h1>
    <p id="url">Loading…</p>
    <button id="send" disabled>Send this page</button>
    <p id="status"></p>
    <script src="popup.js" defer></script>
  </body>
</html>
